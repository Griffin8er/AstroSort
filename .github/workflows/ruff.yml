name: Ruff

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Ruff
        run: python -m pip install ruff

      - name: Run Ruff lint check
        run: ruff check .

      - name: Run Ruff format check
        run: ruff format . --check
